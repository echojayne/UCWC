seed: 7
timestamp_s: 0

channel:
  model: radiomapseer
  pathloss_exponent: 3.2
  shadowing_std_db: 2.5
  noise_figure_db: 7.0
  min_distance_m: 5.0
  radio_map:
    dataset_root: ../../data/radio_maps/mock_radiomapseer
    value_kind: pathloss_db
    resolution_m_per_pixel: 1.0
    clip_coordinates: true
    y_axis: down
    fallback_to_synthetic: false
    maps:
      - bs_id: bs_001
        path: bs_001_pathloss.csv
      - bs_id: bs_002
        path: bs_002_pathloss.csv
      - bs_id: bs_003
        path: bs_003_pathloss.csv

association:
  policy: best_sinr_with_capacity
  allow_overload: false

verifier:
  min_sinr_db: -3.0
  max_cell_utilization: 0.92
  max_cross_user_degradation_pct: 8.0
